<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Dosis de Biocidas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 450px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
        }

        select, input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .resultado {
            margin-top: 20px;
            padding: 15px;
            background-color: #e9f7ef;
            border-radius: 6px;
            font-weight: bold;
            text-align: center;
        }

        .nuevo-biocide {
            background-color: #f1f1f1;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Calculadora de Dosis de Biocidas</h2>

    <label for="biocida">Seleccionar Biocida:</label>
    <select id="biocida">
        <option value="576000">Peróxido de Hidrógeno 48% (OX AGUA) - 576000 ppm</option>
        <option value="187500">Hipoclorito Sódico 15% - 187500 ppm</option>
        <option value="162500">Hipoclorito Sódico 13% - 162500 ppm</option>
        <option value="300000">Peróxido de Hidrógeno 25% (OX AIRE TORRES) - 300000 ppm</option>
    </select>

    <button onclick="mostrarFormularioNuevo()">Añadir Nuevo Biocida</button>

    <div id="formNuevo" class="nuevo-biocide" style="display:none;">
        <label>Nombre del nuevo biocida:</label>
        <input type="text" id="nuevoNombre" placeholder="Ej: Cloro 10%">

        <label>Concentración del biocida (ppm):</label>
        <input type="number" id="nuevoPPM" placeholder="Ej: 120000">

        <button onclick="agregarBiocida()">Guardar Biocida</button>
    </div>

    <label for="dosis">Concentración Deseada (ppm):</label>
    <input type="number" id="dosis" placeholder="Ej: 50">

    <label for="volumen">Volumen del Sistema (litros):</label>
    <input type="number" id="volumen" placeholder="Ej: 10000">

    <button onclick="calcular()">Calcular</button>

    <div id="resultado" class="resultado" style="display:none;"></div>
</div>

<script>
    function mostrarFormularioNuevo() {
        const form = document.getElementById("formNuevo");
        form.style.display = form.style.display === "none" ? "block" : "none";
    }

    function agregarBiocida() {
        const nombre = document.getElementById("nuevoNombre").value;
        const ppm = document.getElementById("nuevoPPM").value;

        if (nombre === "" || ppm === "" || isNaN(ppm)) {
            alert("Complete correctamente los datos del nuevo biocida.");
            return;
        }

        const select = document.getElementById("biocida");
        const nuevaOpcion = document.createElement("option");
        nuevaOpcion.value = ppm;
        nuevaOpcion.text = nombre + " - " + ppm + " ppm";

        select.add(nuevaOpcion);
        select.value = ppm;

        document.getElementById("nuevoNombre").value = "";
        document.getElementById("nuevoPPM").value = "";
        document.getElementById("formNuevo").style.display = "none";
    }

    function calcular() {
        const concentracionBiocida = parseFloat(document.getElementById("biocida").value);
        const dosisDeseada = parseFloat(document.getElementById("dosis").value);
        const volumenSistema = parseFloat(document.getElementById("volumen").value);

        if (isNaN(dosisDeseada) || isNaN(volumenSistema)) {
            alert("Por favor, complete todos los campos.");
            return;
        }

        const volumenLitros = (dosisDeseada * volumenSistema) / concentracionBiocida;
        const volumenML = volumenLitros * 1000;

        const resultadoDiv = document.getElementById("resultado");
        resultadoDiv.style.display = "block";
        resultadoDiv.innerHTML = `
            Volumen a añadir:<br><br>
            ${volumenLitros.toFixed(4)} L<br>
            ${volumenML.toFixed(2)} mL
        `;
    }
</script>

</body>
</html>
